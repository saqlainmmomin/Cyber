{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-brand-dark">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center h-14 w-14 rounded-xl bg-navy-700 mb-4">
        <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">CyberAssess</h1>
      <p class="text-navy-300 mt-1">DPDPA Gap Assessment Tool</p>
    </div>

    <div class="bg-white rounded-xl shadow-2xl p-8">
      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" id="username" required autofocus
                 class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" id="password" required
                 class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition">
        </div>
        <button type="submit"
                class="w-full bg-brand hover:bg-brand-light text-white font-medium py-2.5 rounded-lg transition-colors">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

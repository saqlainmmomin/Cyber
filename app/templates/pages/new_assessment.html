{% extends "base.html" %}
{% block title %}New Assessment{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <a href="/" class="text-sm text-gray-500 hover:text-brand transition-colors">&larr; Back to Dashboard</a>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-bold text-gray-900 mb-6">New Assessment</h1>

    <form method="post" action="/assessments/new" class="space-y-5">
      <div>
        <label for="company_name" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
        <input type="text" name="company_name" id="company_name" required
               placeholder="e.g., Meridian Retail Ltd"
               class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="industry" class="block text-sm font-medium text-gray-700 mb-1">Industry</label>
          <select name="industry" id="industry" required
                  class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition bg-white">
            <option value="">Select industry</option>
            <option value="it_services">IT Services</option>
            <option value="fintech">Fintech</option>
            <option value="healthcare">Healthcare</option>
            <option value="ecommerce">E-Commerce</option>
            <option value="manufacturing">Manufacturing</option>
            <option value="education">Education</option>
            <option value="real_estate">Real Estate</option>
            <option value="legal">Legal</option>
            <option value="accounting">Accounting</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div>
          <label for="company_size" class="block text-sm font-medium text-gray-700 mb-1">Company Size</label>
          <select name="company_size" id="company_size" required
                  class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition bg-white">
            <option value="">Select size</option>
            <option value="startup">Startup (&lt;50 employees)</option>
            <option value="sme">SME (50-500)</option>
            <option value="large">Large (500-5000)</option>
            <option value="enterprise">Enterprise (5000+)</option>
          </select>
        </div>
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
        <textarea name="description" id="description" rows="3"
                  placeholder="Brief description of the organization's data processing activities..."
                  class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-navy-500 focus:ring-2 focus:ring-navy-100 outline-none transition"></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="bg-brand hover:bg-brand-light text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
          Create Assessment
        </button>
        <a href="/"
           class="px-6 py-2.5 rounded-lg text-sm font-medium text-gray-600 border border-gray-300 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

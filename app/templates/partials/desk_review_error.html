<div class="p-4 rounded-lg bg-red-50 border border-red-200">
  <div class="flex items-center gap-3 mb-2">
    <svg class="h-5 w-5 text-red-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
    </svg>
    <p class="text-sm font-medium text-red-900">Desk review failed</p>
  </div>
  {% if error %}
  <p class="text-xs text-red-700 mb-3">{{ error }}</p>
  {% endif %}
  <button hx-post="/assessments/{{ assessment_id }}/run-desk-review"
          hx-target="#desk-review-area"
          hx-swap="innerHTML"
          class="text-sm text-red-700 hover:text-red-900 font-medium">
    Retry
  </button>
</div>

<!-- Follow-up questions generated by Claude based on answer -->
<div class="mt-3 space-y-3 pl-4 border-l-2 border-amber-300">
  <div class="flex items-center gap-2 text-xs text-amber-700">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
    </svg>
    <span class="font-medium">Follow-up questions</span>
  </div>

  {% for fu in followups %}
  <div class="bg-amber-50/50 rounded-lg p-3 border border-amber-100">
    <p class="text-sm text-gray-900 mb-2">{{ fu.text }}</p>
    {% if fu.reason %}
    <p class="text-xs text-amber-600 mb-2">{{ fu.reason }}</p>
    {% endif %}
    <textarea name="followup_{{ fu.id }}" rows="2"
              placeholder="Your response..."
              class="w-full rounded-lg border border-amber-200 px-3 py-2 text-xs focus:border-amber-500 focus:ring-1 focus:ring-amber-200 outline-none transition bg-white"></textarea>
  </div>
  {% endfor %}
</div>

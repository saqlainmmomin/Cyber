<div class="p-4 rounded-lg bg-green-50 border border-green-200">
  <div class="flex items-center gap-3 mb-3">
    <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <p class="text-sm font-medium text-green-900">Analysis Complete</p>
  </div>
  {% if report %}
  <p class="text-sm text-green-700 mb-3">Overall compliance score: <strong>{{ report.overall_score | round(1) }}%</strong></p>
  {% endif %}
  <div class="flex gap-3">
    <a href="/assessments/{{ assessment_id }}?tab=report"
       class="inline-flex items-center gap-2 bg-brand hover:bg-brand-light text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
      View Report
    </a>
    <a href="/api/assessments/{{ assessment_id }}/report/pdf"
       class="inline-flex items-center gap-2 border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
      Download PDF
    </a>
  </div>
</div>
